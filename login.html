<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Secure Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card animate-in">
  <h1>Secure Login</h1>
  <p class="subtitle">Verify your mobile number</p>

  <input id="phone" placeholder="10-digit mobile number" maxlength="10">
  <button id="sendBtn" class="btn-gold">Continue</button>

  <input id="otp" placeholder="Enter OTP" class="fade">
  <button id="verifyBtn" class="btn-gold fade">Verify</button>

  <div id="recaptcha"></div>
</div>

<script type="module" src="firebase.js"></script>

<script>
const phoneInput = document.getElementById("phone");
const otpInput = document.getElementById("otp");
const sendBtn = document.getElementById("sendBtn");
const verifyBtn = document.getElementById("verifyBtn");

/* SEND OTP */
sendBtn.addEventListener("click", async () => {
  const num = phoneInput.value.trim();

  if (!/^[6-9]\d{9}$/.test(num)) {
    alert("Enter valid Indian number");
    return;
  }

  const ok = await window.sendOTP("+91" + num);

  if (ok) {
    otpInput.classList.add("show");
    verifyBtn.classList.add("show");
  }
});

/* VERIFY OTP */
verifyBtn.addEventListener("click", async () => {
  const user = await window.verifyOTP(otpInput.value.trim());
  if (user) {
    localStorage.setItem("user", user.phoneNumber);
    location.href = "choice.html";
  }
});
</script>

</body>
</html>
