<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Access</title>

  <!-- Premium UI -->
  <link rel="stylesheet" href="style.css" />
</head>

<body onload="guardPage('login')">

  <div class="card">
    <h1>Secure Access</h1>
    <p class="subtitle">
      Continue to your private experience
    </p>

    <!-- EMAIL -->
    <input
      type="email"
      id="email"
      placeholder="Email (optional)"
      autocomplete="email"
    />

    <!-- MOBILE -->
    <input
      type="tel"
      id="mobile"
      placeholder="Mobile number (optional)"
      inputmode="numeric"
    />

    <!-- CTA -->
    <button class="btn-gold" onclick="continueAccess()">
      Continue Securely
    </button>

    <p class="footer-note" id="status">
      No OTP • No spam • Instant access
    </p>
  </div>

  <!-- CORE -->
  <script src="core.js"></script>

  <script>
    const SHEET_API =
      "https://script.google.com/macros/s/AKfycbyxisby6sGpVaV4RrBzdQYKpbwgVskgZHWCTITbu0xuQSj8kmQxbeQBglVG3320LjCs3w/exec";

    function continueAccess() {
      const email = document.getElementById("email").value.trim();
      const mobile = document.getElementById("mobile").value.trim();

      if (!email && !mobile) {
        softStatus("Enter email or mobile to continue");
        return;
      }

      // Start session immediately (no OTP)
      const identity = email || mobile;
      onLoginSuccess(identity);

      // Silent Google Sheet logging
      fetch(SHEET_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: email || "-",
          mobile: mobile || "-",
          page: "login",
          time: new Date().toLocaleString(),
          userAgent: navigator.userAgent
        })
      }).catch(() => {});

      softStatus("Redirecting…");
    }

    function softStatus(msg) {
      document.getElementById("status").innerText = msg;
    }
  </script>

</body>
</html>
