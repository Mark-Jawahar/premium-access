<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Login</title>

  <!-- Premium Glass UI -->
  <link rel="stylesheet" href="style.css" />
</head>

<body onload="guardPage('login')">

  <div class="card" id="loginCard">

    <!-- STEP 1: EMAIL -->
    <div id="stepEmail">
      <h1>Secure Access</h1>
      <p class="subtitle">
        Enter your email to receive a one-time verification code.
      </p>

      <input
        type="email"
        id="emailInput"
        placeholder="Email address"
        autocomplete="email"
      />

      <button class="btn-gold" onclick="handleSendOTP()" id="sendBtn">
        Continue
      </button>
    </div>

    <!-- STEP 2: OTP -->
    <div id="stepOTP" style="display:none;">
      <h1>Verify Email</h1>
      <p class="subtitle">
        We’ve sent a 6-digit code to your email.
      </p>

      <input
        type="text"
        id="otpInput"
        placeholder="Enter OTP"
        inputmode="numeric"
        maxlength="6"
      />

      <button class="btn-gold" onclick="handleVerifyOTP()" id="verifyBtn">
        Verify & Continue
      </button>

      <div class="footer-note" style="margin-top:18px;">
        Didn’t receive it? Check spam or wait 60 seconds.
      </div>
    </div>

  </div>

  <!-- CORE ENGINE -->
  <script src="core.js"></script>

  <!-- PAGE LOGIC -->
  <script>
    const emailEl = document.getElementById("emailInput");
    const otpEl   = document.getElementById("otpInput");

    const stepEmail = document.getElementById("stepEmail");
    const stepOTP   = document.getElementById("stepOTP");

    const sendBtn   = document.getElementById("sendBtn");
    const verifyBtn = document.getElementById("verifyBtn");

    /* =========================
       SEND OTP
    ========================= */
    async function handleSendOTP() {
      const email = emailEl.value.trim();

      if (!email || !email.includes("@")) {
        emailEl.classList.add("invalid");
        return;
      }

      emailEl.classList.remove("invalid");
      sendBtn.innerText = "Sending…";
      sendBtn.disabled = true;

      try {
        await sendEmailOTP(email);

        stepEmail.style.display = "none";
        stepOTP.style.display = "block";

      } catch (e) {
        alert("Failed to send OTP. Try again.");
      }

      sendBtn.innerText = "Continue";
      sendBtn.disabled = false;
    }

    /* =========================
       VERIFY OTP
    ========================= */
    async function handleVerifyOTP() {
      const otp = otpEl.value.trim();

      if (otp.length < 4) {
        otpEl.classList.add("invalid");
        return;
      }

      otpEl.classList.remove("invalid");
      verifyBtn.innerText = "Verifying…";
      verifyBtn.disabled = true;

      const success = await verifyEmailOTP(otp);

      if (success) {
        window.location.href = "choice.html";
      } else {
        otpEl.classList.add("invalid");
        alert("Invalid or expired OTP");
      }

      verifyBtn.innerText = "Verify & Continue";
      verifyBtn.disabled = false;
    }
  </script>

</body>
</html>
