<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Access</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="guardPage('login')">
  <div class="glass-card">
    <h1>Secure Login</h1>
    <p class="subtitle">Enter your mobile number to access the portal.</p>

    <div id="step-1">
      <input type="tel" id="phone" placeholder="10-digit mobile number" maxlength="10">
      <button class="btn-gold" onclick="handleSendOTP()">Get Access Code</button>
    </div>

    <div id="step-2" style="display: none;">
      <input type="number" id="otp" placeholder="Enter 6-digit OTP">
      <button class="btn-gold" onclick="handleVerifyOTP()">Verify & Enter</button>
    </div>

    <div id="recaptcha-container"></div>
  </div>

  <script src="core.js"></script>
  <script type="module" src="firebase-config.js"></script>
  <script>
    let confirmationResult;

    async function handleSendOTP() {
      const phone = document.getElementById('phone').value;
      if(phone.length !== 10) return alert('Enter a valid 10-digit number');
      
      const fullPhone = "+91" + phone;
      document.querySelector('.btn-gold').innerText = "Sending...";
      
      try {
        confirmationResult = await window.sendOTP(fullPhone);
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
      } catch (error) {
        alert("Error: " + error.message);
        document.querySelector('.btn-gold').innerText = "Get Access Code";
      }
    }

    async function handleVerifyOTP() {
      const otp = document.getElementById('otp').value;
      try {
        const result = await confirmationResult.confirm(otp);
        store.set('user', { phone: result.user.phoneNumber });
        logActivity({ type: "Login", phone: result.user.phoneNumber });
        window.location.href = 'choice.html';
      } catch (error) {
        alert("Invalid OTP");
      }
    }
  </script>
</body>
</html>
