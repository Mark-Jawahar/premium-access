<!DOCTYPE html>
<html>
<head>
  <title>Email Login</title>
</head>
<body>

<h3>Email Login</h3>

<input id="email" placeholder="Enter email">
<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP" style="display:none">
<button onclick="verifyOTP()" style="display:none">Verify</button>

<script>
const API = "PASTE_APPS_SCRIPT_URL";

function sendOTP() {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "send",
      email: email.value
    })
  }).then(() => {
    otp.style.display = "block";
  });
}

function verifyOTP() {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "verify",
      email: email.value,
      otp: otp.value
    })
  })
  .then(r => r.json())
  .then(res => {
    if (res.success) {
      localStorage.setItem("user", email.value);
      alert("Login success");
    } else {
      alert("Invalid OTP");
    }
  });
}
</script>

</body>
</html>
