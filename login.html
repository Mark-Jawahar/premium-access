<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Login</title>

  <!-- Premium UI -->
  <link rel="stylesheet" href="style.css" />

  <!-- Firebase -->
  <script type="module" src="firebase.js"></script>
</head>

<body onload="guardPage('login')">

  <div class="card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Verify your mobile number to continue</p>

    <!-- PHONE INPUT -->
    <input
      id="phone"
      type="tel"
      placeholder="+91 98765 43210"
      autocomplete="tel"
    />

    <!-- OTP INPUT -->
    <input
      id="otp"
      type="number"
      placeholder="Enter OTP"
      class="hidden"
    />

    <!-- ACTION BUTTON -->
    <button id="actionBtn" class="btn-gold">
      Send OTP
    </button>

    <!-- RECAPTCHA -->
    <div
      id="recaptcha-container"
      style="margin-top:18px; display:flex; justify-content:center;"
    ></div>

    <p class="footer-note">
      Your number is never shared. Secure OTP verification.
    </p>
  </div>

  <!-- CORE -->
  <script src="core.js"></script>

  <!-- LOGIN LOGIC -->
  <script type="module">
    import { sendOTP, verifyOTP } from "./firebase.js";

    const phoneInput = document.getElementById("phone");
    const otpInput = document.getElementById("otp");
    const btn = document.getElementById("actionBtn");

    let otpSent = false;

    btn.onclick = async () => {
      // STEP 1: SEND OTP
      if (!otpSent) {
        const phone = phoneInput.value.trim();

        if (!phone.startsWith("+")) {
          alert("Enter phone number with country code (e.g. +91...)");
          return;
        }

        btn.innerText = "Sending...";
        btn.disabled = true;

        const success = await sendOTP(phone);

        if (success) {
          otpSent = true;
          otpInput.classList.remove("hidden");
          btn.innerText = "Verify OTP";
        } else {
          btn.innerText = "Send OTP";
        }

        btn.disabled = false;
        return;
      }

      // STEP 2: VERIFY OTP
      const otp = otpInput.value.trim();
      if (otp.length < 4) {
        alert("Enter valid OTP");
        return;
      }

      btn.innerText = "Verifying...";
      btn.disabled = true;

      const user = await verifyOTP(otp);

      if (user) {
        setLoggedIn({
          phone: user.phoneNumber,
          uid: user.uid
        });

        window.location.href = "choice.html";
      } else {
        btn.innerText = "Verify OTP";
        btn.disabled = false;
      }
    };
  </script>

</body>
</html>
