<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Access</title>

  <!-- Premium UI -->
  <link rel="stylesheet" href="style.css" />
</head>

<body onload="guardPage('choice')">

  <div class="card">
    <h1>Choose Access</h1>
    <p class="subtitle">
      Select how you want to continue
    </p>

    <div class="list-container">

      <!-- FREE OPTION -->
      <div class="item-card" onclick="goFree()">
        <div class="plan-info">
          <div class="plan-title">Guest Pass</div>
          <div class="plan-desc">
            Preview limited teaser clips
          </div>
        </div>
        <div class="price-tag">Free</div>
      </div>

      <!-- PREMIUM OPTION -->
      <div class="item-card premium" onclick="goPremium()">
        <span class="badge">RECOMMENDED</span>
        <div class="plan-info">
          <div class="plan-title">VIP Premium</div>
          <div class="plan-desc">
            Unlock the full private library
          </div>
        </div>
        <div class="price-tag">👑</div>
      </div>

    </div>

    <p class="footer-note">
      You can upgrade anytime
    </p>
  </div>

  <!-- CORE -->
  <script src="core.js"></script>

  <script>
    function goFree() {
      window.location.href = "free.html";
    }

    function goPremium() {
      window.location.href = "exclusive.html";
    }
  </script>

</body>
</html>
