<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Verification</title>

  <!-- SEO + PERFORMANCE -->
  <meta name="description" content="Age verification required to access premium content.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="style.css" />
</head>

<body onload="guardPage('age')">

  <div class="card">
    <div style="font-size:48px;margin-bottom:14px;">🔞</div>
    <h1>Age Verification</h1>
    <p class="subtitle">
      You must be <b>18 years or older</b> to continue.
    </p>

    <button class="btn-gold" onclick="confirmAge(true)">
      I am 18 or older
    </button>

    <button class="btn-ghost" onclick="confirmAge(false)">
      Exit
    </button>
  </div>

  <script src="core.js"></script>
  <script>
    function confirmAge(ok) {
      if (ok) {
        store.set("age_verified", true);
        location.href = "login.html";
      } else {
        location.href = "https://www.google.com";
      }
    }
  </script>

</body>
</html>
