<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Preview</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body onload="guardPage('free')">

  <div class="card">
    <h1>Free Preview</h1>

      Enjoy a short preview. Unlock premium to access the full private library.
    </p>

    <!-- PREVIEW LIST -->
    <div class="list-container" style="margin-bottom:20px;">

      <a
        href="YOUR_PREVIEW_LINK"
        target="_blank"
        class="item-card"
        style="text-decoration:none;"
      >
        <div class="plan-info">
          <div class="plan-title">Teaser Clip 01</div>
          <div class="plan-desc">Duration: 1 min 45 sec</div>
        </div>
        <div class="price-tag">▶</div>

    </div>

    <!-- VALUE FRAMING -->
    <div class="footer-note" style="margin-bottom:20px;">
      🔒 Premium members get full-length videos, exclusive updates, and priority access.
    </div>

    <!-- CTA -->
    <button class="btn-gold" onclick="location.href='exclusive.html'">
      Unlock Full Access
    </button>

    <!-- SOFT BACK -->
    <button
      class="btn-ghost"
      style="margin-top:12px;"
      onclick="location.href='choice.html'"
    >
      Back
    </button>
  </div>

  <script src="core.js"></script>

</html>
