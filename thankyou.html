<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful</title>

  <!-- SEO + PERFORMANCE -->
  <meta name="description" content="Payment successful. Premium access unlocked.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="style.css">
</head>

<body onload="guardPage('thankyou'); loadReceipt()">

  <div class="card">
    <div style="font-size:48px;">✅</div>
    <h1>Payment Successful</h1>
    <p class="subtitle">Your premium access is active</p>

    <div class="footer-note" id="receipt"></div>

    <button class="btn-gold" onclick="location.href='YOUR_PREMIUM_LINK'">
      Access Premium Content
    </button>
  </div>

  <script src="core.js"></script>
  <script>
    function loadReceipt() {
      const r = store.get("last_payment");
      if (r) {
        receipt.innerText =
          `Plan: ${r.plan} | ₹${r.amount}\nPayment ID: ${r.payment_id}`;
      }
    }
  </script>

</body>
</html>
