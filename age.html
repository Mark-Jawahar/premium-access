<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glass-card">
    <div style="font-size: 48px; margin-bottom: 16px;">🔞</div>
    <h1>Age Verification</h1>
    <p class="subtitle">This platform contains restricted premium content. You must be 18+ to enter.</p>
    
    <button class="btn-gold" onclick="verifyAge(true)">I am 18 or older</button>
    <button class="btn-ghost" onclick="verifyAge(false)">Exit</button>
  </div>

  <script src="core.js"></script>
  <script>
    function verifyAge(isAdult) {
      if (isAdult) {
        store.set('age_verified', true);
        window.location.href = 'login.html';
      } else {
        window.location.href = 'https://google.com';
      }
    }
  </script>
</body>
</html>
