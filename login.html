<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Access</title>

  <!-- SEO + PERFORMANCE -->
  <meta name="description" content="Secure premium access. No OTP. Instant unlock.">
  <meta name="robots" content="index, follow">

  <link rel="stylesheet" href="style.css" />
</head>

<body onload="guardPage('login')">

  <div class="card">
    <h1>Secure Access</h1>
    <p class="subtitle">Instant entry · No OTP · No spam</p>

    <input id="email" type="email" placeholder="Email (optional)">
    <input id="mobile" type="tel" placeholder="Mobile (optional)">

    <button class="btn-gold" onclick="continueAccess()">
      Continue Securely
    </button>

    <p class="footer-note" id="status">Your data stays private</p>
  </div>

  <script src="core.js"></script>
  <script>
    const SHEET_API = "PASTE_GOOGLE_SCRIPT_URL_HERE";

    function continueAccess() {
      const emailVal = email.value.trim();
      const mobileVal = mobile.value.trim();

      if (!emailVal && !mobileVal) {
        status.innerText = "Enter email or mobile to continue";
        return;
      }

      onLoginSuccess(emailVal || mobileVal);

      fetch(SHEET_API, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: emailVal,
          mobile: mobileVal,
          page: "login",
          time: new Date().toLocaleString(),
          userAgent: navigator.userAgent
        })
      });

      status.innerText = "Redirecting…";
    }
  </script>

</body>
</html>
