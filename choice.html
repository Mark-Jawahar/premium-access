<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Access</title>

  <!-- SEO + PERFORMANCE -->
  <meta name="description" content="Choose free preview or unlock premium access.">
  <meta name="robots" content="index, follow">

  <link rel="stylesheet" href="style.css" />
</head>

<body onload="guardPage('choice')">

  <div class="card">
    <h1>Choose Access</h1>
    <p class="subtitle">Select how you want to continue</p>

    <div class="list-container">
      <div class="item-card" onclick="location.href='free.html'">
        <div class="plan-info">
          <div class="plan-title">Free Preview</div>
          <div class="plan-desc">Limited teaser access</div>
        </div>
        <div class="price-tag">Free</div>
      </div>

      <div class="item-card premium" onclick="location.href='exclusive.html'">
        <span class="badge">BEST</span>
        <div class="plan-info">
          <div class="plan-title">VIP Premium</div>
          <div class="plan-desc">Full private library</div>
        </div>
        <div class="price-tag">👑</div>
      </div>
    </div>
  </div>

  <script src="core.js"></script>
</body>
</html>
