<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Email Login</title>
  <style>
    body {
      background: radial-gradient(circle,#1a1a1a,#000);
      font-family: -apple-system, BlinkMacSystemFont;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:#fff;
    }

    .card {
      width:360px;
      padding:28px;
      border-radius:22px;
      background:rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border:1px solid rgba(255,255,255,0.18);
      box-shadow:0 30px 60px rgba(0,0,0,0.8);
      animation:fadeIn .6s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:none;}
    }

    h2 {
      text-align:center;
      margin-bottom:10px;
    }

    .subtitle {
      text-align:center;
      font-size:13px;
      color:#aaa;
      margin-bottom:20px;
    }

    input {
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.2);
      background:rgba(0,0,0,0.4);
      color:#fff;
      margin-bottom:14px;
      font-size:14px;
    }

    button {
      width:100%;
      padding:14px;
      border-radius:14px;
      border:none;
      background:linear-gradient(135deg,#ffd166,#c9a227);
      font-weight:700;
      cursor:pointer;
      transition:.25s;
    }

    button:hover { transform:translateY(-2px); }

    .hidden { display:none; }
  </style>
</head>
<body>

<div class="card">
  <h2>Secure Login</h2>
  <p class="subtitle">Enter your email to continue</p>

  <input id="email" placeholder="Email address">
  <button onclick="sendOTP()">Continue</button>

  <input id="otp" class="hidden" placeholder="Enter OTP">
  <button id="verifyBtn" class="hidden" onclick="verifyOTP()">Verify</button>
</div>

<script>
const API = "YOUR_SCRIPT_URL";

function sendOTP() {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "send",
      email: email.value
    })
  }).then(() => {
    otp.classList.remove("hidden");
    verifyBtn.classList.remove("hidden");
    alert("OTP sent to your email");
  });
}

function verifyOTP() {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "verify",
      email: email.value,
      otp: otp.value
    })
  })
  .then(r => r.json())
  .then(res => {
    if (res.success) {
      localStorage.setItem("user", email.value);
      alert("Login successful");
      // redirect if needed
    } else {
      alert("Invalid or expired OTP");
    }
  });
}
</script>

</body>
</html>
