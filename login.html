<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OTP Login</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="card">
  <h2>Verify Mobile</h2>

  <input id="phone" placeholder="10-digit mobile number" maxlength="10">
  <button id="sendBtn">Continue</button>

  <input id="otp" placeholder="Enter OTP" style="display:none">
  <button id="verifyBtn" style="display:none">Verify OTP</button>

  <div id="recaptcha"></div>
</div>

<!-- IMPORTANT: relative path -->
<script type="module" src="./firebase.js"></script>

<script>
const phone = document.getElementById("phone");
const otp = document.getElementById("otp");
const sendBtn = document.getElementById("sendBtn");
const verifyBtn = document.getElementById("verifyBtn");

sendBtn.onclick = async () => {
  const number = phone.value.trim();

  if (!/^[6-9]\d{9}$/.test(number)) {
    alert("Enter valid Indian number");
    return;
  }

  const ok = await window.sendOTP("+91" + number);
  if (ok) {
    otp.style.display = "block";
    verifyBtn.style.display = "block";
  }
};

verifyBtn.onclick = async () => {
  const user = await window.verifyOTP(otp.value.trim());
  if (user) {
    alert("OTP verified successfully");
  }
};
</script>

</body>
</html>
