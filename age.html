<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Verification</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="card">
    <div style="font-size:48px; margin-bottom:16px;">🔞</div>

    <h1>Age Verification</h1>
    <p class="subtitle">
      This website contains restricted premium content.<br>
      You must be <b>18 years or older</b> to continue.
    </p>

    <button class="btn-gold" onclick="confirmAge(true)">
      I am 18 or older
    </button>

    <button class="btn-ghost" onclick="confirmAge(false)">
      Exit
    </button>

    <p class="footer-note">
      We comply with digital age-restriction regulations.
    </p>
  </div>

  <script src="core.js"></script>

  <script>
    function confirmAge(isAdult) {
      if (isAdult) {
        store.set("age_verified", true);
        window.location.href = "login.html";
      } else {
        window.location.href = "https://google.com";
      }
    }
  </script>

</body>
</html>
