<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Access</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body onload="guardPage('choice')">

  <div class="card">
    <h1>Choose Your Access</h1>
    <p class="subtitle">Select how you’d like to continue.</p>

    <div class="list-container">

      <div class="item-card" onclick="location.href='free.html'">
        <div class="plan-info">
          <div class="plan-title">Guest Preview</div>
          <div class="plan-desc">Limited teaser access</div>
        </div>
        <div class="price-tag">Free</div>
      </div>

      <div class="item-card premium" onclick="location.href='exclusive.html'">
        <div class="badge">BEST VALUE</div>
        <div class="plan-info">
          <div class="plan-title">VIP Premium</div>
          <div class="plan-desc">Unlock full private library</div>
        </div>
        <div class="price-tag">👑</div>
      </div>

    </div>

  </div>

  <script src="core.js"></script>
</body>
</html>
