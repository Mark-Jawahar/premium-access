<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unlock Premium</title>

  <!-- SEO + PERFORMANCE -->
  <meta name="description" content="Unlock premium content with secure Razorpay payment.">
  <meta name="robots" content="index, follow">
  <link rel="preconnect" href="https://checkout.razorpay.com">
  <link rel="dns-prefetch" href="https://checkout.razorpay.com">

  <link rel="stylesheet" href="style.css" />
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body onload="guardPage('exclusive')">

  <div class="card">
    <h1>Unlock Premium</h1>
    <p class="subtitle">One-time payment · Lifetime access</p>

    <div class="list-container">
      <div class="item-card" onclick="startPayment('Starter',49)">
        <div class="plan-info">
          <div class="plan-title">Starter</div>
          <div class="plan-desc">5 Premium Video</div>
        </div>
        <div class="price-tag">₹9</div>
      </div>

      <div class="item-card premium" onclick="startPayment('VIP Lifetime',299)">
        <span class="badge">BEST</span>
        <div class="plan-info">
          <div class="plan-title">VIP Lifetime</div>
          <div class="plan-desc">50+ Videos</div>
        </div>
        <div class="price-tag">₹299</div>
      </div>
    </div>
  </div>

  <script src="core.js"></script>
</body>
</html>
