<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>OTP Login</title>
  <style>
    body {
      background:#111;
      color:#fff;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .card {
      background:#222;
      padding:24px;
      border-radius:12px;
      width:320px;
    }
    input, button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:6px;
      border:none;
    }
    button {
      background:gold;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h3>Verify Mobile</h3>

  <input id="phone" placeholder="10-digit mobile number" maxlength="10" />
  <button id="sendBtn">Continue</button>

  <input id="otp" placeholder="Enter OTP" style="display:none" />
  <button id="verifyBtn" style="display:none">Verify OTP</button>

  <!-- 🔴 REQUIRED -->
  <div id="recaptcha-container"></div>
</div>

<script type="module" src="./firebase.js"></script>

<script>
const phoneInput = document.getElementById("phone");
const otpInput = document.getElementById("otp");
const sendBtn = document.getElementById("sendBtn");
const verifyBtn = document.getElementById("verifyBtn");

sendBtn.onclick = async () => {
  const number = phoneInput.value.trim();

  if (!/^[6-9]\d{9}$/.test(number)) {
    alert("Enter valid Indian number");
    return;
  }

  const success = await window.sendOTP("+91" + number);
  if (success) {
    otpInput.style.display = "block";
    verifyBtn.style.display = "block";
  }
};

verifyBtn.onclick = async () => {
  const user = await window.verifyOTP(otpInput.value.trim());
  if (user) {
    alert("OTP verified successfully ✅");
  }
};
</script>

</body>
</html>
